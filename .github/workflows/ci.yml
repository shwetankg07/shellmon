name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    name: unit (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      # No install step: shellmon is dependency-free by design.
      - run: node --test

  shell:
    name: interactive shell + watch (PTY)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # bash and util-linux `script` (for the PTY) ship on ubuntu-latest.
      # fish is optional — the suite skips shells it can't find.
      - run: bash test/shell-integration.sh
